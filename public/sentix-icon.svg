<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1028"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="s-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#c054fc"/>
    </linearGradient>
    <linearGradient id="circle-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Circular arc (open ring) — flows from bottom-left cyan to top-right purple -->
  <path d="M256 96 A160 160 0 1 1 136 376" stroke="url(#circle-grad)" stroke-width="22" stroke-linecap="round" fill="none"/>
  <!-- Stylized S — large, centered, cyan-to-blue gradient -->
  <path d="M300 160 C220 160 170 185 170 225 C170 270 230 275 270 280 C310 285 340 300 340 335 C340 375 290 400 220 395"
        stroke="url(#s-grad)" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Upward arrow emerging from ring (top-right) — represents growth -->
  <path d="M340 220 L380 140" stroke="url(#arrow-grad)" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M350 145 L383 133 L375 168" fill="#c054fc"/>
  <!-- Bitcoin symbol — golden, small, positioned inside upper curve of S -->
  <text x="272" y="238" font-family="Arial, sans-serif" font-weight="900" font-size="62" fill="#f5a623" text-anchor="middle">&#x20BF;</text>
</svg>
